<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🎓 Course Registration System</h1>
                <p class="header-subtitle">Manage courses and student enrollments efficiently</p>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
                <div class="view-toggle">
                    <button class="active" data-view="cards">📋 Cards</button>
                    <button data-view="table">📊 Table</button>
                </div>
                <form method="post" action="/logout" style="display: inline;">
                    <button type="submit" class="btn btn-danger" style="padding: 10px 20px; font-size: 14px;">
                        🚪 Logout
                    </button>
                </form>
            </div>
        </header>
        
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-info">
                    <h3 id="totalCourses">0</h3>
                    <p>Total Courses</p>
                </div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #4a4a4a, #666666);">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <h3 id="availableCourses">0</h3>
                    <p>Available</p>
                </div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #000000, #1a1a1a);">
                <div class="stat-icon">🔒</div>
                <div class="stat-info">
                    <h3 id="fullCourses">0</h3>
                    <p>Full</p>
                </div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #666666, #808080);">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3 id="totalEnrolled">0</h3>
                    <p>Total Enrolled</p>
                </div>
            </div>
        </div>
        
        <div class="form-section">
            <h2 id="formTitle">Add New Course</h2>
            <form id="courseForm">
                <input type="hidden" id="courseId">
                
                <div class="form-group">
                    <label for="courseName">Course Name *</label>
                    <input type="text" id="courseName" placeholder="e.g., Introduction to Computer Science" required>
                </div>
                
                <div class="form-group">
                    <label for="instructorName">Instructor Name *</label>
                    <input type="text" id="instructorName" placeholder="e.g., Dr. John Smith" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="credits">Credits *</label>
                        <input type="number" id="credits" min="1" max="10" placeholder="3" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="maximumCapacity">Maximum Capacity *</label>
                        <input type="number" id="maximumCapacity" min="1" max="500" placeholder="30" required>
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span class="btn-text">Add Course</span>
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
                </div>
            </form>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Search courses by name...">
            <button class="btn btn-primary" id="searchBtn">Search</button>
            <button class="btn btn-secondary" id="clearSearchBtn">Clear</button>
        </div>
        
        <div class="courses-section">
            <h2>All Courses</h2>
            <div id="coursesList"></div>
            <div class="table-view" id="tableView">
                <table class="course-table">
                    <thead>
                        <tr>
                            <th>Course Name</th>
                            <th>Instructor</th>
                            <th>Credits</th>
                            <th>Capacity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>

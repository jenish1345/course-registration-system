<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Course Registration System</h1>
        </header>
        
        <div class="form-section">
            <h2 id="formTitle">Add New Course</h2>
            <form id="courseForm">
                <input type="hidden" id="courseId">
                
                <div class="form-group">
                    <label for="courseName">Course Name *</label>
                    <input type="text" id="courseName" required>
                </div>
                
                <div class="form-group">
                    <label for="instructorName">Instructor Name *</label>
                    <input type="text" id="instructorName" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="credits">Credits *</label>
                        <input type="number" id="credits" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="maximumCapacity">Maximum Capacity *</label>
                        <input type="number" id="maximumCapacity" min="1" required>
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Add Course</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
                </div>
            </form>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search courses by name...">
            <button class="btn btn-primary" id="searchBtn">Search</button>
            <button class="btn btn-secondary" id="clearSearchBtn">Clear</button>
        </div>
        
        <div class="courses-section">
            <h2>All Courses</h2>
            <div id="coursesList"></div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>

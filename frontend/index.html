<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Registration System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#6a11cb,#2575fc);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
width:100%;
max-width:1100px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:35px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
color:white;
animation:fadeIn 1s ease;
}

header{
text-align:center;
margin-bottom:30px;
}

header h1{
font-size:2.7rem;
letter-spacing:1px;
}

.user-info{
margin-top:15px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

.user-info span{
font-size:1rem;
font-weight:500;
}

.user-info .btn{
padding:8px 16px;
font-size:0.9rem;
}

.form-section{
background:white;
color:#333;
padding:25px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
animation:slideUp .6s ease;
}

.form-section h2{
margin-bottom:20px;
}

.form-group{
margin-bottom:18px;
display:flex;
flex-direction:column;
}

.form-group label{
font-weight:500;
margin-bottom:5px;
}

.form-group input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
transition:all .3s;
}

.form-group input:focus{
border-color:#2575fc;
box-shadow:0 0 6px rgba(37,117,252,.4);
outline:none;
}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.button-group{
display:flex;
gap:12px;
margin-top:10px;
}

.btn{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:500;
transition:all .3s;
}

.btn-primary{
background:linear-gradient(135deg,#2575fc,#6a11cb);
color:white;
}

.btn-secondary{
background:#ccc;
color:#333;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,.2);
}

.search-section{
display:flex;
gap:10px;
margin-bottom:25px;
}

.search-section input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

.courses-section{
background:white;
color:#333;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.courses-section h2{
margin-bottom:20px;
}

#coursesList{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:18px;
}

.course-card{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
padding:18px;
border-radius:12px;
color:#333;
box-shadow:0 6px 12px rgba(0,0,0,.1);
transition:all .3s;
}

.course-card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 12px 20px rgba(0,0,0,.2);
}

.course-card h3{
margin-bottom:8px;
}

.course-card p{
font-size:.9rem;
margin-bottom:6px;
}

.card-buttons{
margin-top:10px;
display:flex;
gap:8px;
}

.card-buttons button{
flex:1;
padding:6px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:.85rem;
}

.edit-btn{
background:#f1c40f;
}

.delete-btn{
background:#e74c3c;
color:white;
}

.edit-btn:hover,
.delete-btn:hover{
opacity:.85;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideUp{
from{transform:translateY(40px);opacity:0}
to{transform:translateY(0);opacity:1}
}

@media(max-width:768px){

.form-row{
grid-template-columns:1fr;
}

.search-section{
flex-direction:column;
}

}
/* BOUNCY PAGE ENTRY */
.container{
animation: bounceIn 1s ease;
}

@keyframes bounceIn{
0%{transform:scale(0.6);opacity:0;}
60%{transform:scale(1.05);}
80%{transform:scale(0.97);}
100%{transform:scale(1);opacity:1;}
}

/* BUTTON SPRING EFFECT */
.btn{
transition:transform .2s ease, box-shadow .2s ease;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

.btn:active{
transform:scale(0.92);
}

/* INPUT POP ANIMATION */
.form-group input{
transition:all .25s ease;
}

.form-group input:focus{
transform:scale(1.03);
border-color:#2575fc;
box-shadow:0 0 8px rgba(37,117,252,.5);
}

/* COURSE CARD BOUNCE */
.course-card{
animation: cardPop .6s ease;
transition:transform .3s ease, box-shadow .3s ease;
}

@keyframes cardPop{
0%{transform:translateY(40px) scale(0.9);opacity:0;}
60%{transform:translateY(-6px) scale(1.05);}
100%{transform:translateY(0) scale(1);opacity:1;}
}

.course-card:hover{
transform:translateY(-8px) scale(1.03) rotate(-0.5deg);
box-shadow:0 15px 25px rgba(0,0,0,0.25);
}

/* SEARCH BAR SMOOTH EFFECT */
.search-section input{
transition:all .3s ease;
}

.search-section input:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,.5);
}

/* HEADER FLOATING EFFECT */
header h1{
animation: floatTitle 3s ease-in-out infinite;
}

@keyframes floatTitle{
0%{transform:translateY(0px);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0px);}
}

/* COURSE CARD BUTTONS */
.card-buttons button{
transition:all .2s ease;
}

.card-buttons button:hover{
transform:scale(1.1);
}

/* SMOOTH PAGE FADE */
body{
animation: pageFade .8s ease;
}

@keyframes pageFade{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Course Registration System</h1>
</header>

<div class="form-section">

<h2 id="formTitle">Add New Course</h2>

<form id="courseForm">

<input type="hidden" id="courseId">

<div class="form-group">
<label for="courseName">Course Name *</label>
<input type="text" id="courseName" required>
</div>

<div class="form-group">
<label for="instructorName">Instructor Name *</label>
<input type="text" id="instructorName" required>
</div>

<div class="form-row">

<div class="form-group">
<label for="credits">Credits *</label>
<input type="number" id="credits" min="1" required>
</div>

<div class="form-group">
<label for="maximumCapacity">Maximum Capacity *</label>
<input type="number" id="maximumCapacity" min="1" required>
</div>

</div>

<div class="button-group">
<button type="submit" class="btn btn-primary" id="submitBtn">Add Course</button>
<button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
</div>

</form>

</div>

<div class="search-section">

<input type="text" id="searchInput" placeholder="Search courses by name...">

<button class="btn btn-primary" id="searchBtn">Search</button>

<button class="btn btn-secondary" id="clearSearchBtn">Clear</button>

</div>

<div class="courses-section">

<h2>All Courses</h2>

<div id="coursesList"></div>

</div>

</div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
    // Check authentication on page load
    document.addEventListener('DOMContentLoaded', function() {
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        } else {
            // Display user info in header
            const user = getCurrentUser();
            const header = document.querySelector('header');
            header.innerHTML = `
                <h1>Course Registration System</h1>
                <div class="user-info">
                    <span>Welcome, ${user.username}!</span>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>
            `;
        }
    });
</script>

</body>
</html>
